name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Build client pipeline bundle
        run: npm run build

      - name: Inject Supabase config (empty = local demo fallback)
        run: |
          cat > public/config.js <<EOF
          window.PRIORAUTH_CONFIG = {
            supabaseUrl: "${{ secrets.SUPABASE_URL }}",
            supabaseAnonKey: "${{ secrets.SUPABASE_ANON_KEY }}"
          };
          EOF

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
